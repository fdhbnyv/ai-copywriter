<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI文案生成器 - 图片上传版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 { font-size: 2.2rem; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 1rem; }
        
        .content { padding: 40px; }
        
        .tab-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-size: 1rem;
        }
        
        .tab.active {
            color: #4facfe;
            border-bottom-color: #4facfe;
        }
        
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            background: #fafafa;
        }
        
        .upload-area:hover {
            border-color: #4facfe;
            background: #f0f7ff;
        }
        
        .upload-area.has-image {
            border-style: solid;
            border-color: #4facfe;
            padding: 15px;
        }
        
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .upload-text { color: #666; font-size: 1rem; }
        .upload-hint { color: #999; font-size: 0.85rem; margin-top: 8px; }
        
        #preview-image {
            max-height: 250px;
            border-radius: 10px;
            display: none;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #4facfe;
        }
        
        textarea { min-height: 100px; resize: vertical; }
        
        .btn {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        .result-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
            display: none;
        }
        
        .result-section.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        .result-title {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        
        .result-content {
            background: white;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #4facfe;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .image-description {
            background: #f0f7ff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            color: #0066cc;
            font-size: 0.9rem;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 25px;
        }
        
        .loading.show { display: block; }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        .status {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        
        .api-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 768px) {
            .content { padding: 20px; }
            .header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 文案生成器</h1>
            <p>上传产品图或输入文字，AI自动生成营销文案</p>
        </div>
        
        <div class="content">
            <!-- 切换标签 -->
            <div class="tab-bar">
                <button class="tab active" onclick="switchTab('image')">📷 图片生成文案</button>
                <button class="tab" onclick="switchTab('text')">✏️ 文字生成文案</button>
            </div>
            
            <!-- 图片上传面板 -->
            <div class="tab-panel active" id="panel-image">
                <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
                    <div id="upload-placeholder">
                        <div class="upload-icon">🖼️</div>
                        <div class="upload-text">点击上传产品图片</div>
                        <div class="upload-hint">支持 JPG、PNG、WebP，最大 10MB</div>
                    </div>
                    <img id="preview-image" alt="预览" />
                </div>
                <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)" />
                
                <div class="input-group">
                    <label for="image-tone">文案风格</label>
                    <select id="image-tone">
                        <option value="专业商务风">专业商务风</option>
                        <option value="亲切友好风">亲切友好风</option>
                        <option value="创意潮流风">创意潮流风</option>
                        <option value="说服营销风">说服营销风</option>
                    </select>
                </div>
                
                <button class="btn" id="btn-image" onclick="generateFromImage()">
                    ✨ 上传图片并生成文案
                </button>
            </div>
            
            <!-- 文字输入面板 -->
            <div class="tab-panel" id="panel-text">
                <div class="input-group">
                    <label for="product-name">产品名称</label>
                    <input type="text" id="product-name" placeholder="例如：无线蓝牙耳机、智能手表...">
                </div>
                
                <div class="input-group">
                    <label for="product-features">产品特点</label>
                    <textarea id="product-features" placeholder="描述产品的核心卖点，例如：降噪功能、长续航、轻便设计..."></textarea>
                </div>
                
                <div class="input-group">
                    <label for="text-tone">文案风格</label>
                    <select id="text-tone">
                        <option value="专业商务风">专业商务风</option>
                        <option value="亲切友好风">亲切友好风</option>
                        <option value="创意潮流风">创意潮流风</option>
                        <option value="说服营销风">说服营销风</option>
                    </select>
                </div>
                
                <button class="btn" id="btn-text" onclick="generateFromText()">
                    ✨ 生成文案
                </button>
            </div>
            
            <!-- 加载状态 -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p id="loading-text">AI 正在分析图片并创作文案...</p>
            </div>
            
            <!-- 状态提示 -->
            <div class="status" id="status"></div>
            
            <!-- 结果展示 -->
            <div class="result-section" id="result-section">
                <h3 class="result-title">📝 生成结果</h3>
                <div class="image-description" id="image-description" style="display:none;"></div>
                <div class="result-content" id="result-content"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedImage = null;
        
        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            
            if (tab === 'image') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('panel-image').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('panel-text').classList.add('active');
            }
            hideResult();
            hideStatus();
        }
        
        // 处理图片上传
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            selectedImage = file;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('preview-image');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('upload-placeholder').style.display = 'none';
                document.getElementById('upload-area').classList.add('has-image');
            };
            reader.readAsDataURL(file);
        }
        
        // 图片模式：上传并生成文案
        async function generateFromImage() {
            if (!selectedImage) {
                showStatus('请先上传一张产品图片', 'error');
                return;
            }
            
            startLoading('AI 正在分析图片并创作文案...');
            hideResult();
            hideStatus();
            
            const formData = new FormData();
            formData.append('image', selectedImage);
            formData.append('tone', document.getElementById('image-tone').value);
            
            try {
                const response = await fetch('http://localhost:5000/api/generate-from-image', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult(data.description, data.copywriting);
                    showStatus('文案生成成功！', 'success');
                } else {
                    throw new Error(data.error || '生成失败');
                }
            } catch (error) {
                showStatus(`连接失败: ${error.message}`, 'error');
            } finally {
                stopLoading();
            }
        }
        
        // 文字模式：生成文案
        async function generateFromText() {
            const productName = document.getElementById('product-name').value;
            const features = document.getElementById('product-features').value;
            const tone = document.getElementById('text-tone').value;
            
            if (!productName.trim()) {
                showStatus('请输入产品名称', 'error');
                return;
            }
            
            startLoading('AI 正在创作文案...');
            hideResult();
            hideStatus();
            
            try {
                const response = await fetch('http://localhost:5000/api/generate-text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product: productName, features: features, tone: tone })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult(null, data.copywriting);
                    showStatus('文案生成成功！', 'success');
                } else {
                    throw new Error(data.error || '生成失败');
                }
            } catch (error) {
                showStatus(`连接失败: ${error.message}`, 'error');
            } finally {
                stopLoading();
            }
        }
        
        function showResult(description, copywriting) {
            const descEl = document.getElementById('image-description');
            if (description) {
                descEl.style.display = 'block';
                descEl.innerHTML = '<strong>📷 AI 识别结果：</strong>' + description;
            } else {
                descEl.style.display = 'none';
            }
            
            document.getElementById('result-content').textContent = copywriting;
            document.getElementById('result-section').classList.add('show');
        }
        
        function hideResult() {
            document.getElementById('result-section').classList.remove('show');
        }
        
        function startLoading(text) {
            document.getElementById('loading-text').textContent = text;
            document.getElementById('loading').classList.add('show');
            document.getElementById('btn-image').disabled = true;
            document.getElementById('btn-text').disabled = true;
        }
        
        function stopLoading() {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('btn-image').disabled = false;
            document.getElementById('btn-text').disabled = false;
        }
        
        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }
        
        function hideStatus() {
            document.getElementById('status').className = 'status';
        }
    </script>
</body>
</html>
